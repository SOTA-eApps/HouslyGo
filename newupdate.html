<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-792K5E73WK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-792K5E73WK');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">NestBook | Update App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* المتغيرات الأساسية للموقع */
        :root {
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.65);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(15, 23, 42, 0.85);
            --hero-bg: radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.15) 0%, transparent 40%),
                       radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                       #0f172a;
            --footer-bg: #020617;
            --font-en: 'Poppins', sans-serif;
            --font-ar: 'Cairo', sans-serif;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --primary: #0284c7; 
                --secondary: #4f46e5;
                --bg-color: #f8fafc;
                --card-bg: rgba(255, 255, 255, 0.7);
                --text-main: #0f172a;
                --text-muted: #475569;
                --border-color: rgba(0, 0, 0, 0.05);
                --nav-bg: rgba(255, 255, 255, 0.85);
                --hero-bg: radial-gradient(circle at 20% 30%, rgba(2, 132, 199, 0.1) 0%, transparent 40%),
                           radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.1) 0%, transparent 40%),
                           #f1f5f9;
                --footer-bg: #e2e8f0;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            background-image: var(--hero-bg);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: var(--font-en);
        }
        
        body[dir="rtl"] { font-family: var(--font-ar); }

        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); transition: all 0.3s ease; }
        .nav-left { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-icon { width: 35px; border-radius: 8px; opacity: 1; transform: scale(1); } 
        .brand { font-size: 24px; font-weight: 700; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
        .nav-right { display: flex; align-items: center; gap: 12px; }

        .lang-wrapper { background: rgba(14, 165, 233, 0.1); color: var(--primary); padding: 6px 14px; border: 1px solid var(--primary); border-radius: 50px; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: all 0.3s ease; font-size: 13px; }
        .lang-wrapper:hover { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3); transform: translateY(-2px); }
        .lang-spinner { background: transparent; color: inherit; border: none; font-size: 13px; font-weight: 600; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; padding: 0; }
        .lang-spinner option { background: var(--bg-color); color: var(--text-main); }

        /* --- تصميم صفحة التحديث المخصصة --- */
        .update-header {
            text-align: center;
            padding: 130px 20px 30px;
        }

        .app-icon-large {
            width: 130px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.4);
            margin-bottom: 25px;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.98); box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3); }
            100% { transform: scale(1.02); box-shadow: 0 15px 40px rgba(14, 165, 233, 0.6); }
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .update-title {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .version-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }

        .update-subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .update-container {
            max-width: 750px; 
            margin: 0 auto 80px;
            padding: 0 20px;
        }

        .update-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            text-align: center; /* توسيط العناصر العامة */
        }

        .whats-new-box {
            text-align: start; /* اتجاه النص يمين للعربي ويسار للإنجليزي */
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        @media (prefers-color-scheme: light) {
            .whats-new-box { background: rgba(241, 245, 249, 0.6); }
        }

        .whats-new-title {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .whats-new-list {
            color: var(--text-main);
            padding-inline-start: 25px;
            margin: 0;
            font-size: 1.05rem;
        }

        .whats-new-list li {
            margin-bottom: 10px;
        }

        .meta-info-box {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 35px;
            padding: 20px;
            border-top: 1px dashed var(--border-color);
            border-bottom: 1px dashed var(--border-color);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .meta-item i {
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        .meta-item span.label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .meta-item span.value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn-download-update {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            width: 100%;
            max-width: 400px;
        }

        .btn-download-update:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.6);
        }

        /* Footer */
        footer { background: var(--footer-bg); padding: 40px 20px 30px; text-align: center; border-top: 1px solid var(--border-color); }
        .company-info { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .sota-logo { width: 40px; border-radius: 10px; }
        .copyright { color: var(--text-muted); font-size: 0.9rem; }

        /* Mobile */
        @media (max-width: 768px) {
            .update-header { padding-top: 110px; }
            .app-icon-large { width: 100px; border-radius: 22px; }
            .update-title { font-size: 2rem; }
            .version-badge { font-size: 1rem; }
            .update-card { padding: 25px 20px; }
            .meta-info-box { flex-direction: column; gap: 15px; }
            .btn-download-update { font-size: 1.1rem; padding: 15px 30px; width: 100%; }
            
            .navbar { padding: 12px 15px; }
            .brand { display: none; } 
            .nav-left { gap: 8px; }
            .nav-right { gap: 6px; }
            .lang-wrapper { padding: 4px 10px; font-size: 11px; }
            .lang-spinner { font-size: 11px; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-left">
            <img src="ico0n.png" alt="NestBook Icon" class="nav-icon">
            <div class="brand">NestBook</div>
        </a>
        
        <div class="nav-right">
            <div class="lang-wrapper">
                <i class="fa-solid fa-globe"></i>
                <select id="langSpinner" class="lang-spinner">
                    <option value="en">EN</option>
                    <option value="ar">عربي</option>
                </select>
            </div>
        </div>
    </nav>

    <header class="update-header">
        <img src="ico0n.png" alt="NestBook App Icon" class="app-icon-large">
        <div class="title-wrapper">
            <h1 class="update-title" data-i18n="updateTitle">New Update Available</h1>
            <span class="version-badge" id="dynVersion">v1.0.0</span>
        </div>
        <p class="update-subtitle" data-i18n="updateSubtitle">It's time to upgrade for amazing features and higher security.</p>
    </header>

    <main class="update-container">
        <div class="update-card">
            
            <div class="whats-new-box">
                <h2 class="whats-new-title">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 
                    <span data-i18n="whatsNew">What's New:</span>
                </h2>
                <ul class="whats-new-list" id="dynFeatures">
                    </ul>
            </div>

            <div class="meta-info-box">
                <div class="meta-item">
                    <i class="fa-solid fa-weight-hanging"></i>
                    <span class="label" data-i18n="appSize">App Size</span>
                    <span class="value" id="dynSize">0 MB</span>
                </div>
                <div class="meta-item">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span class="label" data-i18n="releaseDate">Release Date</span>
                    <span class="value" id="dynDate">Date</span>
                </div>
            </div>

            <a href="#" id="dynDownloadLink" class="btn-download-update">
                <i class="fa-brands fa-android"></i>
                <span data-i18n="downloadBtn">Download Update</span>
            </a>

        </div>
    </main>

    <footer>
        <div class="company-info">
            <img src="sota.png" alt="SOTA-eApps Logo" class="sota-logo">
            <span style="font-size: 1.1rem; font-weight: 600;" data-i18n="bySota">by SOTA-eApps</span>
        </div>
        <p class="copyright">
            <span data-i18n="copyright">&copy; 2026 SOTA-eApps. All rights reserved.</span> <br>
            nestbooksupport@gmail.com
        </p>
    </footer>

    <script>
        // ========================================================
        // 🔴 منطقة التعديل المخصصة للمطور (عدل البيانات هنا فقط) 🔴
        // ========================================================
        const updateData = {
            version: "v1.1.5", // رقم الإصدار
            apkSize: "15 MB", // حجم التطبيق
            dateEn: "Sun, 5 April 2026", // تاريخ النزول بالإنجليزي
            dateAr: "الأحد، 5 أبريل 2026", // تاريخ النزول بالعربي
            downloadUrl: "https://example.com/nestbook-update.apk", // رابط مباشر لملف הـ APK
            
            // الميزات الجديدة أو التحسينات (اكتب كل نقطة بين علامتي تنصيص مفصولة بفاصلة)
            featuresEn: [
                "Added new property search filters.",
                "Improved app loading speed significantly.",
                "Fixed bugs related to image uploading."
            ],
            featuresAr: [
                "إضافة فلاتر بحث جديدة ومتقدمة للعقارات.",
                "تحسين سرعة تحميل التطبيق بشكل ملحوظ.",
                "إصلاح بعض الأخطاء المتعلقة برفع الصور."
            ]
        };
        // ========================================================

        // حقن البيانات الثابتة (الرابط، الإصدار، الحجم)
        document.getElementById('dynVersion').innerText = updateData.version;
        document.getElementById('dynSize').innerText = updateData.apkSize;
        document.getElementById('dynDownloadLink').href = updateData.downloadUrl;

        // قواميس الترجمة الأساسية للصفحة
        const translations = {
            en: {
                pageTitle: "Update App",
                updateTitle: "New Update Available",
                updateSubtitle: "It's time to upgrade for amazing features and higher security.",
                whatsNew: "What's New:",
                appSize: "App Size",
                releaseDate: "Release Date",
                downloadBtn: "Download Update",
                bySota: "by SOTA-eApps",
                copyright: "© 2026 SOTA-eApps. All rights reserved."
            },
            ar: {
                pageTitle: "تحديث التطبيق",
                updateTitle: "تحديث جديد متاح",
                updateSubtitle: "حان وقت الترقية لتجربة ميزات مذهلة وأمان أعلى.",
                whatsNew: "ما الجديد في هذا الإصدار:",
                appSize: "حجم التطبيق",
                releaseDate: "تاريخ النزول",
                downloadBtn: "تحميل التحديث",
                bySota: "بواسطة SOTA-eApps",
                copyright: "© 2026 SOTA-eApps. جميع الحقوق محفوظة."
            }
        };

        const langSpinner = document.getElementById('langSpinner');
        const userLang = navigator.language || navigator.userLanguage;
        let currentLang = localStorage.getItem('appLang') || (userLang.startsWith('ar') ? 'ar' : 'en');
        
        langSpinner.value = currentLang;
        setLanguage(currentLang);

        langSpinner.addEventListener('change', (e) => {
            setLanguage(e.target.value);
        });

        function setLanguage(lang) {
            localStorage.setItem('appLang', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

            // 1. ترجمة النصوص الثابتة
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
            document.title = translations[lang].pageTitle + (lang === 'ar' ? " | نيست بوك" : " | NestBook");

            // 2. حقن البيانات الديناميكية (المميزات والتاريخ) بناءً على اللغة
            document.getElementById('dynDate').innerText = lang === 'ar' ? updateData.dateAr : updateData.dateEn;
            
            const featuresList = document.getElementById('dynFeatures');
            featuresList.innerHTML = ''; // مسح القائمة الحالية
            const currentFeatures = lang === 'ar' ? updateData.featuresAr : updateData.featuresEn;
            
            // تحويل المصفوفة إلى عناصر قائمة <li>
            currentFeatures.forEach(feature => {
                const li = document.createElement('li');
                li.innerText = feature;
                featuresList.appendChild(li);
            });
        }

        // تأثير الشريط العلوي
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
